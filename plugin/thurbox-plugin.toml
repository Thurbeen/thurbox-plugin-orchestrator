name = "orchestrator"
version = "0.1.0"
thurbox_plugin_api = 1
description = "Beads-driven multi-agent orchestrator. Ships a role + two skills; workflow uses bd and thurbox-cli directly, no plugin daemon."
author = "Thurbeen"

# Skills auto-registered when the plugin is enabled. install.sh stages
# `skills/` into the plugin payload alongside this manifest.
[[contributes.skills]]
name = "orchestrate"
path = "skills/orchestrate"

[[contributes.skills]]
name = "orchestrate-worker"
path = "skills/orchestrate-worker"

# Role enforces the orchestrator contract at the tool layer (Write/Edit
# disabled; Bash(bd:*) / Bash(thurbox-cli:*) / Bash(mkdir:*) pre-approved)
# and ships the system prompt. Spawn the orchestrator session with
# `thurbox-cli session create --role orchestrator ...` to opt in.
[[contributes.roles]]
name = "orchestrator"
path = "roles/orchestrator.toml"

# Worker role: permissive (`dontAsk`) so per-bead sessions complete
# without interactive prompts. The orchestrate skill passes
# `--role worker` when dispatching.
[[contributes.roles]]
name = "worker"
path = "roles/worker.toml"
